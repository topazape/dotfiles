# vim: set filetype=dosini:

[sqlfluff]
dialect = bigquery
sql_file_exts = .sql,.bq,.bql
# core グループに加え、非 core ルールを明示的に有効化
# LT03: 改行をまたぐ演算子の位置(layout.operators)
rules = core,AL01,CV01,CV02,CV06,CV08,CV10,CV11,LT03,LT04,LT09,RF02,RF05,RF06,ST01,ST02,ST04,ST05,AM05,AM07
# LT05: 行長チェックを無効化, RF01: FROM 句に無いテーブルの参照チェック(BigQuery 方言では元々無効)
exclude_rules = LT05,RF01
# これより大きいファイルは lint をスキップする(128 KiB)
large_file_skip_byte_limit = 131072

# インデント
[sqlfluff:indentation]
# インデント文字はスペース(タブを使わない)
indent_unit = space
# インデント1段 = 4 スペース
tab_space_size = 4
# JOIN 句は FROM と同じ深さに置く(FROM から1段下げない)
indented_joins = False
# JOIN の ON / USING 句を改行する場合、JOIN から1段下げる
indented_using_on = True
# ON の中の条件式(AND で続く各条件)を改行する場合、ON からさらに1段下げる
indented_on_contents = True
# WITH 句の CTE 定義(name AS (...))は WITH と同じ深さ(行)に置く
# True にすると WITH の直後で改行し、CTE 定義を1段・その中身を2段下げる
indented_ctes = False
# CASE 式で THEN を改行する場合、WHEN から1段下げる
indented_then = True
# THEN の結果式を改行する場合、THEN からさらに下げず同じ深さに置く
indented_then_contents = False
# キーワードと同じ行に内容を書き始める形(例: WHERE a で始めて
# 次行を AND b と1段下げる)を許容する(forbid: 禁止, require: 強制)
implicit_indents = allow

# カンマ
[sqlfluff:layout:type:comma]
# カンマの直前にスペースを入れない
spacing_before = touch
# 改行する場合、カンマは行末に置く(行頭カンマ禁止)
line_position = trailing

# 二項演算子(+, -, ||, << など)
# 演算子前後の単一スペースはデフォルトの LT01(layout.spacing)で強制される
[sqlfluff:layout:type:binary_operator]
# 式の途中で改行する場合、演算子を行末ではなく行頭に置く(LT03 が評価)
line_position = leading

# テーブルのエイリアスは AS を省略せず書く(FROM t AS a)
[sqlfluff:rules:aliasing.table]
aliasing = explicit

# カラムのエイリアスは AS を省略せず書く(SELECT x AS y)
[sqlfluff:rules:aliasing.column]
aliasing = explicit

# 計算式・関数などの式カラムには必ずエイリアスをつける
# False = SELECT が単一式のみの場合(SELECT COUNT(*) FROM t)も免除しない
[sqlfluff:rules:aliasing.expression]
allow_scalar = False

# 予約語(SELECT, FROM など)は大文字に統一
[sqlfluff:rules:capitalisation.keywords]
capitalisation_policy = upper

# 識別子(テーブル名・カラム名・エイリアス)は小文字に統一
[sqlfluff:rules:capitalisation.identifiers]
capitalisation_policy = lower

# 関数名(SUM, CAST など)は大文字に統一
[sqlfluff:rules:capitalisation.functions]
extended_capitalisation_policy = upper

# リテラル(TRUE, FALSE, NULL)は大文字に統一
[sqlfluff:rules:capitalisation.literals]
capitalisation_policy = upper

# データ型(STRING, INT64 など)は大文字に統一
[sqlfluff:rules:capitalisation.types]
capitalisation_policy = upper

# SELECT の最後のカラムの後ろにカンマを置かない
[sqlfluff:rules:convention.select_trailing_comma]
select_clause_trailing_comma = forbid

# 文の末尾には必ずセミコロンをつける
# 複数行の文では、セミコロンは最終行ではなく改行して単独行に置く
[sqlfluff:rules:convention.terminator]
multiline_newline = True
require_final_semicolon = True

# 文字列リテラルはダブルクォートに統一
# force_enable はデフォルトのまま(BigQuery 方言ではこのルールは元々有効)
[sqlfluff:rules:convention.quoted_literals]
force_enable = False
preferred_quoted_literal_style = double_quotes

# 型変換は CAST(式 AS 型) に統一(x::INT64 や CONVERT を禁止)
[sqlfluff:rules:convention.casting_style]
preferred_type_casting_style = cast

# GROUP BY / ORDER BY では序数(GROUP BY 1)ではなくカラム名を書く
[sqlfluff:rules:ambiguous.column_references]
group_by_and_order_by_style = explicit

# JOIN の種別を省略しない(JOIN → INNER JOIN, LEFT JOIN → LEFT OUTER JOIN)
[sqlfluff:rules:ambiguous.join]
fully_qualify_join_types = both

# JOIN 句の中にはサブクエリを書かず CTE に切り出す
[sqlfluff:rules:structure.subquery]
forbid_subquery_in = join
